
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KatBan</title>
    <!-- BOOTSTRAP -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Estilos Propios -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar navbarColor py-1 sticky-top">
        <div class="d-flex align-items-center ms-4 gap-2">
            <a href="home.html" class="text-decoration-none text-secondary fw-medium">Mis Proyectos</a>
            <i class="bi bi-chevron-right text-secondary"></i>
            <span class="text-white" id="navbar-project-title">Título del proyecto</span>
        </div>

        <div class="ms-auto me-4">
            <img src="assets/LOGO.png" alt="Logo" width="50" height="50">
        </div>
    </nav>

    <div class="container-fluid mt-3 d-flex justify-content-center">
        <div class="input-group search-box rounded-pill overflow-hidden">
            <span class="input-group-text bg-transparent border-0 text-secondary ps-3">
                <i class="bi bi-search"></i>
            </span>
            <input type="text" id="search-tasks-input" class="form-control bg-transparent border-0 shadow-none ps-1" placeholder="Buscar tareas en este tablero...">
            <button id="clear-tasks-btn" class="btn btn-link text-decoration-none text-muted border-0 pe-3" style="display: none;">✕</button>
        </div>
    </div>

    <section class="bg-white pb-4">
        <div class="container-fluid">
            <div class="row">
                <div class="col-12">
                    <h1 class="mt-4 fw-semibold"><span id="project-title">Título del proyecto</span> <i class="bi bi-pencil fs-6 ms-2" id="edit-project-title" role="button"></i></h1>
                    <p class="ms-2 text-secondary"><span id="project-description">Descripción</span> <i class="bi bi-pencil fs-6 ms-2" id="edit-project-desc" role="button"></i></p>
                </div>  
            </div>
        </div>

        <div class="container-fluid">
            <div id="board-container" class="d-flex flex-nowrap overflow-auto gap-3 pb-3 align-items-start board-min-height">
                <!-- Columnas renderizadas dinámicamente por script.js -->
            </div>
        </div>
        
    </section>
    
</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</html>
