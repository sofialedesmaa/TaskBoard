<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Proyectos</title>
    <link rel="icon" type="image/png" href="img/LOGO.png">
    <!-- FUENTES -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- ESTILO CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="bg-primary text-white p-3 mb-4" style="background-color: #1d4380 !important;">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <span class="fs-6 text-white-50">Mis proyectos > <strong class="text-white">Título del proyecto</strong></span>
            <h1 class="fs-4 m-0">EDITOR DE TAREAS</h1>
            <div class="rounded-circle bg-light overflow-hidden d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                <img src="img/logo.png" alt="Logo Katban" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
        </div>
    </header>

    <main class="container-fluid my-4">
        <div class="row">
            
            <section class="col-md-8 px-4">
                <h2 class="mb-4 fw-bold">TITULO DEL PROYECTO</h2>
                
                <form id="form-tarea">
                    <div class="mb-3">
                        <label for="info-tarea" class="form-label fw-semibold text-muted">Crear nueva tarea</label>
                        <input type="text" class="form-control bg-light py-2" id="info-tarea" placeholder="Agregá información de la tarea.">
                    </div>

                    <div class="mb-3">
                        <label for="titulo-tarea" class="form-label fw-semibold">Título de la tarea*</label>
                        <input type="text" class="form-control bg-light py-2" id="titulo-tarea" placeholder="Ej: Diseñar banner para Instagram" required>
                    </div>

                    <div class="mb-3">
                        <label for="desc-tarea" class="form-label fw-semibold text-muted">Descripción</label>
                        <textarea class="form-control bg-light" id="desc-tarea" rows="3" placeholder="Escribí detalles, referencias o indicaciones..."></textarea>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <label for="fecha-tarea" class="form-label fw-semibold">Fecha de vencimiento</label>
                            <input type="date" class="form-control bg-light py-2" id="fecha-tarea">
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <label for="tipo-pieza" class="form-label fw-semibold">Tipo de pieza*</label>
                            <select class="form-select bg-light py-2" id="tipo-pieza" required>
                                <option value="" selected disabled>(Logo)(Banner)(Redes)(UI)(Otro)</option>
                                <option value="logo">Logo</option>
                                <option value="banner">Banner</option>
                                <option value="redes">Redes</option>
                                <option value="ui">UI</option>
                                <option value="otro">Otro</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="estado-tarea" class="form-label fw-semibold">Estado ▽</label>
                            <select class="form-select bg-light py-2" id="estado-tarea">
                                <option value="brief">Brief</option>
                                <option value="proceso">En proceso</option>
                                <option value="revision">Revisión del cliente</option>
                                <option value="aprobado">Aprobado</option>
                            </select>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-3 mt-4">
                        <button type="button" class="btn px-4 py-2 fw-semibold text-white btn-cancelar" style="background-color: #1d4380;">Cancelar</button>
                        <button type="submit" class="btn px-4 py-2 fw-semibold text-white btn-crear" style="background-color: #1d4380;">Crear tarea</button>
                    </div>
                </form>
            </section>
            
        <aside class="col-md-4 border-start ps-4">
            <h3 class="text-center fs-5 fw-bold mb-4">MIS TAREAS</h3>
    
            <div id="lista-tareas" class="d-flex flex-column gap-3"></div>
        </aside>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
    <script src="script.js"></script>
</body>
</html>
