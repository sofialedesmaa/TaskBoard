<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KatBan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
     <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body min-vh-100">
    <header class="dashboard-navbar position-fixed top-0 start-0 end-0 d-flex align-items-center justify-content-between px-4 shadow-sm">
        <span class="fw-bold text-white text-uppercase">Buscador</span>
        <div class="ms-auto d-flex align-items-center gap-3">
            <img src="assets/LOGO.png" alt="Logo" width="50" height="50">
            <button onclick="logout()" class="btn btn-outline-light btn-sm" title="Cerrar sesión">
                <i class="bi bi-box-arrow-right"></i> Salir
            </button>
        </div>
    </header>

    <aside class="dashboard-sidebar position-fixed bottom-0 start-0 py-4 border-end">
        <div class="px-4 pb-3 fs-5 fw-bold">
            <span class="text-primary-brand">Task</span><span>Board</span>
        </div>

        <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" href="home.html">
                        <i class="bi bi-house-door"></i> Inicio
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" href="home.html">
                        <i class="bi bi-layout-text-sidebar-reverse"></i> Mis proyectos
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" href="editortareas.html">
                        <i class="bi bi-check2-square"></i> Todas las tareas
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center gap-2" href="board.html?new=1">
                        <i class="bi bi-plus-square"></i> Nuevo proyecto
                    </a>
                </li>
        </ul>
    </aside>

    <main class="dashboard-main">
        <h1 class="fs-3 fw-bold mb-1">¡Bienvenido/a, <span id="nombreUsuario">Usuario/a</span>!</h1>
        <p class="text-secondary mb-4">Mis proyectos ...</p>

        <div class="mt-3 mb-5 d-flex justify-content-start">
            <div class="input-group rounded-pill overflow-hidden border bg-white shadow-sm" style="max-width: 500px;">
                <span class="input-group-text bg-transparent border-0 text-secondary ps-3">
                    <i class="bi bi-search"></i>
                </span>
                <input
                    type="text"
                    id="search-projects-input"
                    class="form-control bg-transparent border-0 shadow-none ps-1"
                    placeholder="Buscar proyectos..."
                >
                <button
                    id="clear-projects-btn"
                    class="btn btn-link text-decoration-none text-muted border-0 pe-3"
                    style="display: none;">
                    ✕
                </button>
            </div>
        </div>

        <div class="d-flex flex-wrap align-items-stretch gap-3">
            <a href="board.html" class="project-card card border-0 overflow-hidden text-decoration-none text-reset">
                <div class="project-card-cover" style="background-color: #7F9C96;"></div>
                <div class="card-body p-3">
                    <p class="card-title small fw-semibold text-truncate mb-2">Título del proyecto 1</p>
                    <div class="d-flex align-items-center flex-wrap gap-2">
                        <span class="small text-secondary">Tareas</span>
                        <span class="small text-muted d-flex align-items-center gap-1"><span
                            class="stat-dot rounded-circle d-inline-block bg-success"></span> x</span>
                        <span class="small text-muted d-flex align-items-center gap-1"><span
                            class="stat-dot rounded-circle d-inline-block bg-warning"></span> x</span>
                        <span class="small text-muted d-flex align-items-center gap-1"><span
                            class="stat-dot rounded-circle d-inline-block bg-danger"></span> x</span>
                    </div>
                </div>
            </a>

            <a href="board.html" class="project-card card border-0 overflow-hidden text-decoration-none text-reset">
                <div class="project-card-cover" style="background-color: #b5c68a;"></div>
                <div class="card-body p-3">
                    <p class="card-title small fw-semibold text-truncate mb-2">Título del proyecto 2</p>
                    <div class="d-flex align-items-center flex-wrap gap-2">
                        <span class="small text-secondary">Tareas</span>
                        <span class="small text-muted d-flex align-items-center gap-1"><span
                            class="stat-dot rounded-circle d-inline-block bg-success"></span> x</span>
                        <span class="small text-muted d-flex align-items-center gap-1"><span
                            class="stat-dot rounded-circle d-inline-block bg-warning"></span> x</span>
                        <span class="small text-muted d-flex align-items-center gap-1"><span
                            class="stat-dot rounded-circle d-inline-block bg-danger"></span> x</span>
                    </div>
                </div>
            </a>

            <a class="project-card-new d-flex flex-column align-items-center justify-content-center gap-3 py-4 text-decoration-none"
                href="board.html?new=1">
                <div class="new-project-icon rounded-circle d-flex align-items-center justify-content-center">
                    <i class="bi bi-plus"></i>
                </div>
                <span class="small fw-semibold text-primary-brand">Nuevo proyecto</span>
            </a>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
