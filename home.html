<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASKBOARD</title>
    <!-- BOOTSTRAP -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Estilos Propios -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark px-3">
        <span class="navbar-brand">Mi App</span>
        <!-- Acá aparece el nombre del usuario -->
        <span id="bienvenida" class="text-white"></span>
        <button onclick="logout()" class="btn btn-outline-light btn-sm ms-3">
            Cerrar sesión
        </button>
    </nav>

    <div class="container mt-4">
        <h2>Bienvenido 👋</h2>
        <p>Esta página solo se ve si estás logueado.</p>
    </div>

    <script src="validation.js"></script>
    <script>
        // Muestro el nombre guardado en localStorage
        const nombre = localStorage.getItem('nombre_usuario');
        document.getElementById('bienvenida').textContent = nombre;

        function logout() {
            localStorage.removeItem('token_mediaPila');
            localStorage.removeItem('nombre_usuario');
            window.location.href = 'login.html';
        }
    </script>

</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</html>
