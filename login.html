<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TaskBoard</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Estilos Propios -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="d-flex align-items-center justify-content-center">

    <div class="d-flex flex-column align-items-center w-100">
        <!-- Logo del Gatito flotando -->
        <div class="login-logo-container">
            <img src="LOGO.png" alt="Logo de la aplicación">
        </div>

        <!-- Tarjeta de formulario -->
        <div class="login-card p-4 p-md-5 mx-3">
            <div class="pt-3">
                <h3 class="fw-bold text-center mb-4 mt-2 text-uppercase"
                    style="font-size: 1.25rem; letter-spacing: 1px; color: #333;">
                    Iniciar Sesión
                </h3>

                <!-- Email -->
                <div class="mb-3">
                    <label for="inputEmail" class="form-label-custom">Email:</label>
                    <input type="email" id="inputEmail" class="form-control form-control-custom"
                        placeholder="mediapila@mediapila.com">
                </div>

                <!-- Contraseña -->
                <div class="mb-3">
                    <label for="inputPassword" class="form-label-custom">Contraseña:</label>
                    <input type="password" id="inputPassword" class="form-control form-control-custom">
                    <div class="text-end mt-2">
                        <a href="#" class="login-link text-decoration-none" data-bs-toggle="modal"
                            data-bs-target="#modalRecuperar">Olvidé mi contraseña</a>
                    </div>
                </div>

                <!-- Botón Ingresar -->
                <div class="d-flex justify-content-center mt-4">
                    <button onclick="login()" class="btn btn-ingresar rounded-pill shadow-sm px-4">
                        Ingresar
                    </button>
                </div>

                <!-- Crear Cuenta -->
                <div class="text-center mt-3">
                    <a href="#" class="login-link text-decoration-none" data-bs-toggle="modal"
                        data-bs-target="#modalRegistro">Crear cuenta</a>
                </div>

                <!-- Mensaje de Error/Éxito -->
                <div id="mensaje" class="mt-3"></div>
            </div>
        </div>
    </div>

    <!-- Modal Registro -->
    <div class="modal fade" id="modalRegistro" tabindex="-1" aria-labelledby="modalRegistroLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-content-custom">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title modal-title-custom fw-bold w-100 text-center text-uppercase mt-3"
                        id="modalRegistroLabel">Crear Cuenta</h5>
                    <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body px-4 pb-4">
                    <div id="mensajeRegistro" class="mb-2"></div>
                    <div class="mb-3">
                        <label for="regNombre" class="form-label-custom">Nombre:</label>
                        <input type="text" id="regNombre" class="form-control form-control-custom"
                            placeholder="Ej: Maria">
                    </div>
                    <div class="mb-3">
                        <label for="regEmail" class="form-label-custom">Email:</label>
                        <input type="email" id="regEmail" class="form-control form-control-custom"
                            placeholder="Ej: mediapila@mediapila.com">
                    </div>
                    <div class="mb-3">
                        <label for="regPassword" class="form-label-custom">Contraseña:</label>
                        <input type="password" id="regPassword" class="form-control form-control-custom">
                    </div>
                    <div class="d-flex justify-content-center mt-4">
                        <button onclick="registrarUsuario()" class="btn btn-ingresar rounded-pill px-4 shadow-sm">
                            Registrarse
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Recuperar -->
    <div class="modal fade" id="modalRecuperar" tabindex="-1" aria-labelledby="modalRecuperarLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-content-custom">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title modal-title-custom fw-bold w-100 text-center text-uppercase mt-3"
                        id="modalRecuperarLabel">Recuperar Contraseña</h5>
                    <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body px-4 pb-4">
                    <div id="mensajeRecuperar" class="mb-2"></div>
                    <p class="text-muted text-center small mb-3">Ingresa tu correo registrado para recuperar tu
                        contraseña.</p>
                    <div class="mb-3">
                        <label for="recupEmail" class="form-label-custom">Email:</label>
                        <input type="email" id="recupEmail" class="form-control form-control-custom"
                            placeholder="Ej: mediapila@mediapila.com">
                    </div>
                    <div class="d-flex justify-content-center mt-4">
                        <button onclick="recuperarPassword()" class="btn btn-ingresar rounded-pill px-4 shadow-sm">
                            Recuperar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="login.js"></script>
</body>

</html>
